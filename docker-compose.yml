services:
  webapp-conversation:
    image: node:22-alpine
    container_name: webapp-conversation
    restart: unless-stopped
    working_dir: /app
    security_opt:
      - seccomp:unconfined
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      HUSKY: "0"
      PORT: "3001"
      HOSTNAME: 0.0.0.0
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      DIFY_CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-https://dify.dongnanedu.com}
    volumes:
      - ./:/app
      - webapp_node_modules:/app/node_modules
      - webapp_next:/app/.next
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f node_modules/.install-done ]; then
          echo "Installing dependencies..."
          npm install
          touch node_modules/.install-done
        fi
        MARKER=/app/.build-marker
        if [ ! -f .next/standalone/server.js ] || [ "$$(cat "$$MARKER" 2>/dev/null)" != "basepath=/webapp" ]; then
          echo "Building Next.js app..."
          npm run build
          mkdir -p .next/standalone/.next
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          echo "basepath=/webapp" > "$$MARKER"
        fi
        echo "Starting webapp on port 3001..."
        export NODE_ENV=production
        export PORT=3001
        export HOSTNAME=0.0.0.0
        cd .next/standalone
        exec node server.js

volumes:
  webapp_node_modules:
  webapp_next:
